<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilgidir - Bilgi Paylaşım Platformu</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f0f0;
            color: #333;
            max-width: 900px;
            margin: 2em auto;
            padding: 1em;
            line-height: 1.6;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1, h2 {
            color: #2c3e50;
        }
        .header {
            text-align: center;
            margin-bottom: 1em;
            padding: 1em;
            background: #f8f9fa;
            border-radius: 10px;
            max-width: 600px;
            margin: 0 auto;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 1em;
            margin-bottom: 1em;
        }
        input[type="email"], textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        button {
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            max-width: 150px;
            margin: 0 auto;
        }
        button:hover {
            background-color: #0056b3;
        }
        .categories {
            margin-top: 2em;
        }
        .category {
            padding: 1em;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 1em;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .category:hover {
            background-color: #e9ecef;
        }
        .sidebar {
            float: left;
            width: 25%;
            margin-right: 2em;
            background: #f8f9fa;
            padding: 1em;
            border-radius: 10px;
        }
        .content {
            float: left;
            width: 70%;
        }
        .clearfix::after {
            content: "";
            display: table;
            clear: both;
        }
        .category-list {
            list-style-type: none;
            padding: 0;
        }
        .category-list li {
            padding: 0.5em;
            border-bottom: 1px solid #ccc;
        }
        .category-list li a {
            text-decoration: none;
            color: #007bff;
        }
        .category-list li a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="clearfix">
        <div class="sidebar">
            <h2>Kategoriler</h2>
            <ul class="category-list">
                <li><a href="#fotografcilik">Fotoğrafçılık</a></li>
                <li><a href="#tarih">Tarih</a></li>
                <li><a href="#bilim">Bilim</a></li>
                <li><a href="#sanat">Sanat</a></li>
                <li><a href="#kultur">Kültür</a></li>
            </ul>
        </div>
        <div class="content">
            <div class="header">
                <h1>Öğrenmek İstediğiniz Bilgiyi Bize İletin, Sizinle Bilgimizi Paylaşalım!</h1>
                <form action="https://formspree.io/f/mnnqqqkw" method="POST">
                    <label for="email">Email Adresiniz:</label>
                    <input type="email" id="email" name="email" required>
                    <label for="message">Mesajınız:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                    <button type="submit">Gönder</button>
                </form>
                <p style="font-size: 0.9em; color: #666;">bilgidir.com hata yapabilir. Önemli bilgileri kontrol edin.</p>
            </div>
        </div>
    </div>
</body>
</html>
