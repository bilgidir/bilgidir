<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilgidir.com - Blog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        .container {
            width: 80%;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .blog-post {
            margin-bottom: 40px;
        }

        .blog-title {
            font-size: 1.8em;
            margin-bottom: 10px;
            color: #333;
        }

        .blog-content {
            color: #555;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Bilgidir.com Blogu</h1>

        <!-- Blog Yazıları -->
        <div id="blog-posts">
            <!-- Mevcut gönderiler buraya eklenecek -->
        </div>
    </div>

    <script>
        // Mevcut blog yazıları listesi
        const blogPosts = [
            {
                title: "Gergedanların Gizemli Dünyası: Devlerin Sakin Yaşamı",
                content: `
                    Gergedanlar, genellikle sakin ve yalnız yaşayan devasa otçullardır. Her bir türünün kendine has özellikleri olsa da, hepsinin ortak noktası güçlü yapıları ve etkileyici boynuzlarıdır. İşte gergedanlar hakkında ilginç bilgiler:
                    <ul>
                        <li><strong>Çamur Banyosu Aşığı:</strong> Gergedanlar günlerinin büyük bir kısmını çamur banyosunda geçirirler. Bu banyolar onları serinletmenin yanı sıra parazitlerden de korur. Aynı zamanda ciltlerinin nemli kalmasına yardımcı olur.</li>
                        <li><strong>Güçlü Ama Hızlı:</strong> Gergedanlar görünümlerinin aksine kısa mesafelerde oldukça hızlı koşabilirler. Saate yaklaşık 50 kilometre hızla koşabilirler ve bu, onları tehdit eden yırtıcı hayvanlardan kaçarken çok işlerine yarar.</li>
                        <li><strong>Boynuzları Özel ve Kırılgan:</strong> Gergedanın boynuzu, keratin adı verilen bir maddeden oluşur. Bu madde, insan tırnağı ve saçının yapı taşlarıyla aynıdır. Boynuzları oldukça değerli olmasına rağmen, ne yazık ki bu durum onları kaçak avcıların hedefi haline getiriyor.</li>
                    </ul>
                `
            },
            {
                title: "Everest Dağı'nın Sırları",
                content: `
                    Everest Dağı, dünyanın en yüksek zirvesi olarak kabul ediliyor. Zirveye ulaşmak isteyen birçok dağcı, yıllarca süren hazırlıklar ve tehlikelerle dolu bir yolculuk yapıyor. İşte Everest Dağı hakkında ilginç bilgiler:
                    <ul>
                        <li><strong>Yükseklik:</strong> Everest'in yüksekliği yaklaşık 8,848 metredir ve Himalayalar'da yer alır.</li>
                        <li><strong>Ölüm Bölgesi:</strong> Zirveye tırmanmaya çalışan insanların birçoğu "ölüm bölgesi" olarak adlandırılan, oksijenin çok düşük olduğu 8,000 metre civarında zorlanır.</li>
                        <li><strong>Çöp Sorunu:</strong> Dağda, dağcıların bıraktığı çöp ve ekipmanlar nedeniyle devasa bir atık sorunu vardır; her yıl tonlarca çöp toplanmaktadır.</li>
                    </ul>
                `
            }
        ];

        // Blog yazılarını sayfaya ekleme
        const blogPostsContainer = document.getElementById('blog-posts');

        blogPosts.forEach(post => {
            const postElement = document.createElement('div');
            postElement.classList.add('blog-post');
            postElement.innerHTML = `
                <h2 class="blog-title">${post.title}</h2>
                <div class="blog-content">${post.content}</div>
            `;
            blogPostsContainer.appendChild(postElement);
        });
    </script>
</body>

</html>
